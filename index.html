        const ROUND_SIZE = 10;
        let pendingIndices = [];
        let mistakeIndices = [];
        let currentRoundWords = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let currentCorrectAnswer = "";
        let roundNumber = 1;

        // Load progress from Local Storage
        function loadData() {
            const savedPending = localStorage.getItem('tnpsc_pending');
            const savedMistakes = localStorage.getItem('tnpsc_mistakes');
            const savedRound = localStorage.getItem('tnpsc_round');

            if (savedPending) {
                pendingIndices = JSON.parse(savedPending);
                mistakeIndices = JSON.parse(savedMistakes || "[]");
                roundNumber = parseInt(savedRound || "1");
            } else {
                resetData();
            }
        }

        // Save progress to Local Storage
        function saveData() {
            localStorage.setItem('tnpsc_pending', JSON.stringify(pendingIndices));
            localStorage.setItem('tnpsc_mistakes', JSON.stringify(mistakeIndices));
            localStorage.setItem('tnpsc_round', roundNumber);
        }

        // Reset all data
        function resetData() {
            pendingIndices = masterVocabulary.map((_, index) => index);
            // Shuffle initially
            pendingIndices = pendingIndices.sort(() => Math.random() - 0.5);
            mistakeIndices = [];
            roundNumber = 1;
            saveData();
        }

        function resetEntireTest() {
            if(confirm("நீங்கள் இதுவரை படித்த அனைத்தும் அழிக்கப்பட்டு முதலில் இருந்து தொடங்குமா?")) {
                resetData();
                startRound();
            }
        }

        function startRound() {
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            
            // Check if everything is finished
            if (pendingIndices.length === 0 && mistakeIndices.length === 0) {
                alert("வாழ்த்துக்கள்! நீங்கள் அனைத்து வார்த்தைகளையும் முடித்துவிட்டீர்கள். மீண்டும் முதலில் இருந்து தொடங்குகிறது.");
                resetData();
            }

            currentRoundWords = [];
            
            // 1. Add mistake words first (Spaced Repetition)
            while (mistakeIndices.length > 0 && currentRoundWords.length < ROUND_SIZE) {
                // Get unique mistakes
                let idx = mistakeIndices.shift();
                if(!currentRoundWords.includes(idx)) {
                    currentRoundWords.push(idx);
                }
            }

            // 2. Fill the rest with new words
            while (pendingIndices.length > 0 && currentRoundWords.length < ROUND_SIZE) {
                currentRoundWords.push(pendingIndices.shift());
            }

            // Shuffle current round words
            currentRoundWords = currentRoundWords.sort(() => Math.random() - 0.5);

            currentQuestionIndex = 0;
            score = 0;
            saveData();
            showQuestion();
        }

        function showQuestion() {
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('round-info').innerText = `சுற்று ${roundNumber} (கேள்வி ${currentQuestionIndex + 1}/${currentRoundWords.length})`;
            document.getElementById('words-left').innerText = `மீதமுள்ளவை: ${pendingIndices.length + mistakeIndices.length}`;

            let wordIndex = currentRoundWords[currentQuestionIndex];
            let wordObj = masterVocabulary[wordIndex];

            // Randomly decide English to Tamil OR Tamil to English
            let isEnglishToTamil = Math.random() > 0.5;

            let questionText, correctOptionText;
            if (isEnglishToTamil) {
                questionText = wordObj.en;
                correctOptionText = wordObj.ta;
            } else {
                questionText = wordObj.ta;
                correctOptionText = wordObj.en;
            }

            currentCorrectAnswer = correctOptionText;
            document.getElementById('question').innerText = questionText;

            // Generate Options
            let options = [correctOptionText];
            
            // Get 3 random wrong options
            while (options.length < 4) {
                let randomWordObj = masterVocabulary[Math.floor(Math.random() * masterVocabulary.length)];
                let wrongOptionText = isEnglishToTamil ? randomWordObj.ta : randomWordObj.en;
                
                if (!options.includes(wrongOptionText)) {
                    options.push(wrongOptionText);
                }
            }

            // Shuffle options
            options = options.sort(() => Math.random() - 0.5);

            let optionsHtml = "";
            options.forEach((opt, i) => {
                optionsHtml += `<button onclick="checkAnswer(this, '${opt}', ${wordIndex})">${opt}</button>`;
            });
            document.getElementById('options-container').innerHTML = optionsHtml;
        }

        function checkAnswer(btn, selectedOption, wordIndex) {
            // Disable all buttons
            let allBtns = document.getElementById('options-container').querySelectorAll('button');
            allBtns.forEach(b => {
                b.disabled = true;
                if (b.innerText === currentCorrectAnswer) {
                    b.classList.add('correct'); // Highlight correct answer
                }
            });

            if (selectedOption === currentCorrectAnswer) {
                btn.classList.add('correct');
                score++;
            } else {
                btn.classList.add('wrong');
                // Add to mistakes if not already there
                if (!mistakeIndices.includes(wordIndex)) {
                    mistakeIndices.push(wordIndex);
                    saveData();
                }
            }

            document.getElementById('next-btn').style.display = 'block';
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < currentRoundWords.length) {
                showQuestion();
            } else {
                endRound();
            }
        }

        function endRound() {
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('round-score').innerText = `மதிப்பெண்: ${score}/${currentRoundWords.length}`;
            
            let mistakeCount = currentRoundWords.length - score;
            if(mistakeCount > 0) {
                document.getElementById('mistake-info').innerText = `நீங்கள் ${mistakeCount} கேள்விகளுக்கு தவறாக பதிலளித்துள்ளீர்கள். அவை அடுத்த சுற்றுகளில் மீண்டும் கேட்கப்படும்.`;
            } else {
                document.getElementById('mistake-info').innerText = "அற்புதம்! அனைத்து விடைகளும் சரி.";
            }

            roundNumber++;
            saveData();
        }

        // Initialize App
        loadData();
        startRound();

    </script>
